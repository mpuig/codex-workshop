<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loss Ratio by Region -- 2025</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f8f9fa; }
  .chart-container { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  h1 { color: #2c3e50; font-size: 1.4em; }
  .legend { display: flex; gap: 20px; margin-top: 12px; font-size: 0.85em; color: #666; }
  .legend span { display: inline-block; width: 14px; height: 14px; border-radius: 3px; vertical-align: middle; margin-right: 4px; }
</style>
</head>
<body>
<div class="chart-container">
  <h1>MIG Motor Portfolio -- Loss Ratio by Region (2025)</h1>
  <canvas id="chart" width="700" height="400"></canvas>
  <div class="legend">
    <div><span style="background: rgba(40,167,69,0.8);"></span> Below 70% (OK)</div>
    <div><span style="background: rgba(255,193,7,0.8);"></span> 70-85% (Concerning)</div>
    <div><span style="background: rgba(220,53,69,0.8);"></span> Above 85% (Critical)</div>
  </div>
</div>
<script>
new Chart(document.getElementById('chart'), {
  type: 'bar',
  data: {
    labels: ["Andalusia", "Valencia", "Madrid", "Catalonia", "Galicia", "Basque Country"],
    datasets: [{
      label: 'Loss Ratio (%)',
      data: [91.1, 83.1, 67.1, 65.1, 62.1, 58.1],
      backgroundColor: ["rgba(220, 53, 69, 0.8)", "rgba(255, 193, 7, 0.8)", "rgba(40, 167, 69, 0.8)", "rgba(40, 167, 69, 0.8)", "rgba(40, 167, 69, 0.8)", "rgba(40, 167, 69, 0.8)"],
      borderColor: ["rgba(220, 53, 69, 1)", "rgba(255, 193, 7, 1)", "rgba(40, 167, 69, 1)", "rgba(40, 167, 69, 1)", "rgba(40, 167, 69, 1)", "rgba(40, 167, 69, 1)"],
      borderWidth: 1
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: function(ctx) { return ctx.parsed.y.toFixed(1) + '%'; }
        }
      }
    },
    scales: {
      y: {
        beginAtZero: true,
        max: 110,
        title: { display: true, text: 'Loss Ratio (%)' },
        ticks: { callback: function(v) { return v + '%'; } }
      },
      x: { title: { display: true, text: 'Region' } }
    },
    animation: { duration: 800 }
  },
  plugins: [{
    afterDraw: function(chart) {
      var ctx = chart.ctx;
      var yAxis = chart.scales.y;
      var xAxis = chart.scales.x;
      // 70% line
      var y70 = yAxis.getPixelForValue(70);
      ctx.save();
      ctx.strokeStyle = 'rgba(255, 193, 7, 0.9)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(xAxis.left, y70);
      ctx.lineTo(xAxis.right, y70);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255, 193, 7, 1)';
      ctx.font = '11px sans-serif';
      ctx.fillText('Target: 70%', xAxis.right + 5, y70 + 4);
      // 85% line
      var y85 = yAxis.getPixelForValue(85);
      ctx.strokeStyle = 'rgba(220, 53, 69, 0.9)';
      ctx.beginPath();
      ctx.moveTo(xAxis.left, y85);
      ctx.lineTo(xAxis.right, y85);
      ctx.stroke();
      ctx.fillStyle = 'rgba(220, 53, 69, 1)';
      ctx.fillText('Critical: 85%', xAxis.right + 5, y85 + 4);
      ctx.restore();
    }
  }]
});
</script>
</body>
</html>
